<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSA Platform - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="login-wrapper">
        <!-- Left Side - Branding -->
        <div class="login-left">
            <div class="overlay"></div>
            <div class="branding-content">
                <div class="logo">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1>CSA Platform</h1>
                <p>Control Self-Assessment System</p>
                <div class="tagline">
                    <div class="line"></div>
                    <span>Excellence in Compliance</span>
                    <div class="line"></div>
                </div>
            </div>
            <div class="features">
                <div class="feature-item">
                    <i class="fas fa-check-circle"></i>
                    <span>Automated Control Management</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-check-circle"></i>
                    <span>Real-time Compliance Tracking</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-check-circle"></i>
                    <span>Comprehensive Audit Trail</span>
                </div>
            </div>
        </div>

        <!-- Right Side - Login Options -->
        <div class="login-right">
            <div class="login-container">
                <div class="welcome-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to access the platform</p>
                </div>

                <!-- Traditional Login Form -->
                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label for="employeeId">Employee ID</label>
                        <div class="input-wrapper">
                            <i class="fas fa-id-card"></i>
                            <input type="text" id="employeeId" placeholder="Enter your employee ID" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Enter your password" required>
                            <button type="button" class="toggle-password" onclick="togglePassword()">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <!-- Role Selection Buttons -->
                    <div class="role-selection">
                        <p class="role-label">Select your role:</p>
                        <div class="role-buttons">
                            <button type="button" class="role-btn" data-role="assessor"
                                onclick="selectRole('assessor')">
                                <i class="fas fa-user-edit"></i>
                                <span>Assessor</span>
                            </button>
                            <button type="button" class="role-btn" data-role="certifier"
                                onclick="selectRole('certifier')">
                                <i class="fas fa-user-check"></i>
                                <span>Certifier</span>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn" disabled>
                        <span>Sign In</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <!-- Footer -->
                <div class="login-footer">
                    <p>&copy; 2027 CSA Platform. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedRole = null;

        // Select role function
        function selectRole(role) {
            selectedRole = role;

            // Update button states
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            document.querySelector(`[data-role="${role}"]`).classList.add('active');

            // Enable submit button
            document.getElementById('submitBtn').disabled = false;
        }

        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password i');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.classList.remove('fa-eye');
                toggleBtn.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleBtn.classList.remove('fa-eye-slash');
                toggleBtn.classList.add('fa-eye');
            }
        }

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            if (!selectedRole) {
                alert('Please select a role (Assessor or Certifier)');
                return;
            }

            const employeeId = document.getElementById('employeeId').value;
            const password = document.getElementById('password').value;

            // Store user info and redirect
            sessionStorage.setItem('userEmployeeId', employeeId);
            sessionStorage.setItem('userRole', selectedRole);
            window.location.href = 'dashboard.html?role=' + selectedRole;
        });

        // Add entrance animation
        window.addEventListener('load', function () {
            document.querySelector('.login-wrapper').classList.add('loaded');
        });
    </script>
</body>

</html>
